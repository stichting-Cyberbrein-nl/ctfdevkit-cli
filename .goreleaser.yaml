version: 2

project_name: devkit

before:
  hooks:
    - go mod tidy

builds:
  - id: devkit
    main: ./cmd/devkit
    binary: devkit
    ldflags:
      - -s -w -X main.version={{.Version}}
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - id: devkit
    ids: [devkit]
    # Produces: devkit-linux-amd64.tar.gz, devkit-windows-amd64.zip, etc.
    name_template: "devkit-{{ .Os }}-{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - scripts/install.sh
      - scripts/install-macos.sh
      - scripts/install.ps1

checksum:
  name_template: checksums.txt
  algorithm: sha256

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - Merge pull request
      - Merge branch

release:
  github:
    owner: stichting-Cyberbrein-nl
    name: ctfdevkit-cli
  name_template: "v{{.Version}}"
  draft: false
  prerelease: auto
